<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://java.sun.com/jsf/html">

    <h:head>
        <title>PrimeFaces Test</title>
    </h:head>
    <h:body>

        <h:form id="frmTest">
          <p:dataTable value="#{testView.entries}" var="entry" draggableRows="true" >

            <p:column headerText="Type">
              <h:outputText value="#{entry.name}" />
            </p:column>

            <p:column headerText="Value">
              <p:inputText rendered="#{entry.isString()}" value="#{entry.value}">
                <p:ajax partialSubmit="true" update="" event="keydown" />
                <p:ajax partialSubmit="true" update="" event="keyup" />
              </p:inputText>
              
              <p:selectBooleanCheckbox rendered="#{entry.isBoolean()}" value="#{entry.value}">
                <p:ajax partialSubmit="true" update="" event="change" />
              </p:selectBooleanCheckbox>
              
              <p:datePicker rendered="#{entry.isDate()}" value="#{entry.value}">
                <p:ajax partialSubmit="true" update="" event="change" />
              </p:datePicker>
            </p:column>

            <p:ajax partialSubmit="true" event="rowReorder" update="" />
          </p:dataTable>

        </h:form>

    </h:body>
</html>
