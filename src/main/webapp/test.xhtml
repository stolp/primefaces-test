<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
  xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
  <title>PrimeFaces Test</title>
  <h:outputScript name="test.js" />
</h:head>
<h:body id="printBody">

  <h1>Try printing with Print Button vs printing via CTRL-P</h1>
  <h:form id="commandForm">
    <p:commandButton value="Print" type="button" icon="pi pi-print" styleClass="p-d-block p-shadow-2 p-mb-3">
      <p:printer target="printBody" />
    </p:commandButton>
  </h:form>
  <div>
      <div class="card">
        <p:lineChart model="#{testView.lineModel}" style="width: 100%; height: 500px;" />
      </div>
  </div>

</h:body>
</html>
