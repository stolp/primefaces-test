<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://java.sun.com/jsf/html">

    <h:head>
        <title>PrimeFaces Test</title>
    </h:head>
    <h:body>

        <h:form id="frmTest">
          <h1>Disabled: #{testView.disabled}</h1>
          <p:commandButton
            action="#{testView.action}" disabled="#{testView.disabled}"
            partialSubmit="true" update="@form"
            value="Click to toggle disabled state" />
          <p:commandButton
            action="#{testView.enableAction}"
            partialSubmit="true" update="@form"
            value="Click to set enable state" />
        </h:form>

    </h:body>
</html>
